version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: servlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: servlink
      POSTGRES_USER: servlink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - servlink-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servlink -d servlink"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: servlink-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_SEED_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/servlink
      SPRING_DATASOURCE_USERNAME: servlink
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS:-3600000}
    ports:
      - "8080:8080"

volumes:
  servlink-db-data:
